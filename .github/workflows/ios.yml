name: iOS Build

# This is the section that was likely missing
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          target: 'ios'
          
      - name: Build iOS
        env:
          CMAKE_PREFIX_PATH: ${{ steps.install-qt.outputs.qt-path }}
        run: |
          ./tools/tool build --target ios
