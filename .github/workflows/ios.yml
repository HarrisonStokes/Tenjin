name: iOS Build

# This is the section that was likely missing
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Qt
        id: install-qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          target: 'ios'
      - name: Build
        run: |
          ./tools/tool build --target ios
